# Production profile
server:
  tomcat:
    max-threads: 200
    min-spare-threads: 20
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  devtools:
    restart:
      enabled: false
  jackson:
    serialization:
      indent-output: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  datasource:
    url: jdbc:mysql://localhost:3306/gjp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}

# ── CMS (prod overrides) ──
cms:
  base-url: ${CMS_BASE_URL:https://www.ganjianping.com/ai/admin}
  upload:
    root-directory: ${CMS_UPLOAD_ROOT_DIRECTORY:/var/www/gjp/upload}

# Logging configuration
logging:
  level:
    org.ganjp.api: WARN
    org.springframework: WARN
  file:
    name: logs/gjp-api-admin.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
